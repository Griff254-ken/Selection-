<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Synergy Protocol | Joy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;1,400&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #d4af37; 
            --bg-dark: #0a0f19;
            --glass: rgba(15, 23, 42, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.25);
            transition: background-image 2s ease-in-out;
            background-image: url('https://images.unsplash.com/photo-1526495124232-a027afbb48b1?auto=format&fit=crop&q=80&w=1920'); /* Burj Khalifa Default */
        }

        main {
            width: 90%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4rem;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
        }

        .step { display: none; animation: slideIn 0.7s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        .step.active { display: block; }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 1rem; color: var(--accent); letter-spacing: -1px; }
        .subtitle { font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; display: block; opacity: 0.8; }
        .description { line-height: 1.8; margin-bottom: 2.5rem; color: #cbd5e1; font-weight: 300; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.2rem;
            max-height: 45vh;
            overflow-y: auto;
            padding-right: 15px;
        }

        .grid::-webkit-scrollbar { width: 3px; }
        .grid::-webkit-scrollbar-thumb { background: var(--accent); }

        .choice-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .choice-card:hover {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-5px);
        }

        .choice-card h3 { font-size: 1.1rem; margin-bottom: 6px; letter-spacing: 0.5px; }
        .choice-card p { font-size: 0.75rem; opacity: 0.5; font-family: 'Fira Code', monospace; color: var(--accent); }

        #toast-stack { position: fixed; top: 30px; right: 30px; z-index: 9999; }
        .toast {
            background: #fff; color: #000; padding: 14px 28px; margin-bottom: 12px;
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            border-left: 6px solid var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: toastEnter 0.5s ease forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastEnter { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .progress-indicator {
            position: absolute; top: 0; left: 0; height: 2px;
            background: var(--accent); transition: width 0.6s ease;
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div id="toast-stack"></div>

    <main>
        <div class="progress-indicator" id="progress-bar"></div>
        <div id="render-mount"></div>
    </main>

    <script>
        const AppConfig = {
            steps: [
                {
                    id: 'init',
                    subtitle: 'Secure Access',
                    title: 'The Synergy Protocol',
                    desc: 'Welcome, Joy. This interface is designed to map cultural, technical, and lifestyle preferences into a singular compatibility matrix.',
                    options: [{ label: 'Initialize Protocol', value: 'start', meta: 'AUTH_REQUIRED' }]
                },
                {
                    id: 'landmark',
                    subtitle: 'Architecture',
                    title: 'Favorite Icon?',
                    desc: 'Which feat of human engineering resonates with your spirit?',
                    options: [
                        { label: 'Eiffel Tower', value: 'Eiffel', meta: 'Parisian Heritage' },
                        { label: 'Burj Khalifa', value: 'Burj', meta: 'Dubai Innovation' }
                    ]
                },
                {
                    id: 'role_model',
                    subtitle: 'Archetypes',
                    title: 'Ideal Role Model?',
                    desc: 'Choose the figure whose legacy of impact you admire most.',
                    options: [
                        { label: 'Elon Musk', value: 'Elon', meta: 'Multi-Planetary Vision' },
                        { label: 'Mark Zuckerberg', value: 'Mark', meta: 'Social Connectivity' },
                        { label: 'Kevin Mitnick', value: 'Kevin', meta: 'The Legend of Hacking' },
                        { label: 'Ada Lovelace', value: 'Ada', meta: 'The First Programmer' }
                    ]
                },
                {
                    id: 'state',
                    subtitle: 'Geography',
                    title: 'Preferred US State?',
                    desc: 'Identify the region that best hosts your ambition.',
                    options: [
                        { label: 'California', value: 'CA', meta: 'Valley Innovation' },
                        { label: 'Florida', value: 'FL', meta: 'Miami Excellence' },
                        { label: 'New York', value: 'NY', meta: 'Empire Ambition' },
                        { label: 'Texas', value: 'TX', meta: 'Modern Scale' }
                    ]
                },
                {
                    id: 'language',
                    subtitle: 'Linguistics',
                    title: 'Foreign Dialect?',
                    desc: 'Which language would you choose to master fluently?',
                    options: [
                        { label: 'French', value: 'FR', meta: 'Romantic Precision' },
                        { label: 'Chinese', value: 'ZH', meta: 'Global Mandate' },
                        { label: 'Spanish', value: 'ES', meta: 'Vibrant Heritage' },
                        { label: 'Italian', value: 'IT', meta: 'Classical Lyricism' }
                    ]
                },
                {
                    id: 'music',
                    subtitle: 'Acoustics',
                    title: 'Musical Direction?',
                    desc: 'Select the frequency that governs your atmosphere.',
                    options: [
                        { label: 'Hillsong', value: 'Hillsong', meta: 'Pop Gospel' },
                        { label: 'Amapiano', value: 'Amapiano', meta: 'Soulful Pulse' },
                        { label: 'Afrobeats', value: 'Afrobeats', meta: 'Vibrant Fusion' },
                        { label: 'Trap', value: 'Trap', meta: 'Sonic Edge' }
                    ]
                },
                {
                    id: 'end',
                    subtitle: 'Encryption',
                    title: 'Sync Complete',
                    desc: 'All selections have been logged and processed. The synergy matrix is now stable.',
                    options: [{ label: 'End Session', value: 'reset', meta: 'CLEAR_CACHE' }]
                }
            ]
        };

        let currentStep = 0;

        function render() {
            const step = AppConfig.steps[currentStep];
            const mount = document.getElementById('render-mount');
            const progress = ((currentStep + 1) / AppConfig.steps.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            let optionsHTML = `<div class="grid">`;
            step.options.forEach(opt => {
                optionsHTML += `
                    <div class="choice-card" onclick="handleChoice('${step.id}', '${opt.value}', '${opt.label}')">
                        <h3>${opt.label}</h3>
                        <p>${opt.meta}</p>
                    </div>
                `;
            });
            optionsHTML += `</div>`;

            mount.innerHTML = `
                <div class="step active">
                    <span class="subtitle">${step.subtitle}</span>
                    <h1>${step.title}</h1>
                    <p class="description">${step.desc}</p>
                    ${optionsHTML}
                </div>
            `;
        }

        function handleChoice(stepId, value, label) {
            if (value === 'reset') {
                location.reload();
                return;
            }

            // Silent Data Logging (Enterprise Grade)
            const storageKey = 'protocol_selections';
            let data = JSON.parse(localStorage.getItem(storageKey) || '{}');
            data[stepId] = label;
            localStorage.setItem(storageKey, JSON.stringify(data));

            createToast(`Logged: ${label}`);

            currentStep++;
            if (currentStep < AppConfig.steps.length) {
                render();
            }
        }

        function createToast(msg) {
            const stack = document.getElementById('toast-stack');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = `[SUCCESS] ${msg}`;
            stack.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        window.onload = render;
    </script>
</body>
    </html>
