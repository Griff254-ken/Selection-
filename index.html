<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Synergy Protocol</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;1,400&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #d4af37; 
            --bg-dark: #0a0f19;
            --glass: rgba(15, 23, 42, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) blur(2px);
            transition: background-image 1.5s ease-in-out;
            background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1920');
        }

        main {
            width: 95%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .step { display: none; animation: fadeIn 0.6s ease-out forwards; }
        .step.active { display: block; }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent); }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; display: block; }

        /* Grid for Choices */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            max-height: 40vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .grid::-webkit-scrollbar { width: 4px; }
        .grid::-webkit-scrollbar-thumb { background: var(--accent); }

        .choice-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .choice-card:hover {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .choice-card h3 { font-size: 1rem; margin-bottom: 4px; }
        .choice-card p { font-size: 0.7rem; opacity: 0.6; font-family: 'Fira Code', monospace; }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast {
            background: #fff; color: #000; padding: 12px 20px; border-radius: 4px;
            margin-bottom: 10px; font-weight: 700; font-size: 0.8rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div id="toast-container"></div>

    <main>
        <div id="step-container">
            </div>
    </main>

    <script>
        const config = {
            steps: [
                {
                    id: 'intro',
                    subtitle: 'Authentication',
                    title: 'Welcome, Joy',
                    desc: 'This protocol will synchronize your preferences with the global standard. Please proceed with precision.',
                    options: [{ label: 'Initialize', value: 'start', meta: 'SECURE LINK' }]
                },
                {
                    id: 'state',
                    subtitle: 'Geography',
                    title: 'Preferred US State?',
                    desc: 'Select the territory that aligns with your lifestyle or vision.',
                    options: [
                        { label: 'California', value: 'CA', meta: 'Tech & Sunshine' },
                        { label: 'Florida', value: 'FL', meta: 'Miami & Coastal' },
                        { label: 'New York', value: 'NY', meta: 'Empire State' },
                        { label: 'Texas', value: 'TX', meta: 'Modern Frontier' },
                        { label: 'Washington', value: 'WA', meta: 'Nature & Innovation' }
                    ]
                },
                {
                    id: 'language',
                    subtitle: 'Communication',
                    title: 'Linguistic Preference?',
                    desc: 'Which culture do you wish to master?',
                    options: [
                        { label: 'French', value: 'fr', meta: 'Elegance' },
                        { label: 'Chinese', value: 'zh', meta: 'Influence' },
                        { label: 'Spanish', value: 'es', meta: 'Passion' },
                        { label: 'Italian', value: 'it', meta: 'Heritage' }
                    ]
                },
                {
                    id: 'music',
                    subtitle: 'Acoustics',
                    title: 'Rhythmic Alignment?',
                    desc: 'What is the soundtrack to your excellence?',
                    options: [
                        { label: 'Hillsong', value: 'hillsong', meta: 'Pop Gospel' },
                        { label: 'Amapiano', value: 'amapiano', meta: 'South African Soul' },
                        { label: 'Afrobeats', value: 'afrobeats', meta: 'Global Rhythm' },
                        { label: 'Trap', value: 'trap', meta: 'Urban Energy' }
                    ]
                },
                {
                    id: 'final',
                    subtitle: 'Processing',
                    title: 'Protocol Satisfied',
                    desc: 'All selections have been encrypted. Your profile is now being analyzed by the system.',
                    options: []
                }
            ]
        };

        let currentStep = 0;

        function init() {
            renderStep(0);
        }

        function renderStep(index) {
            const step = config.steps[index];
            const container = document.getElementById('step-content');
            const root = document.getElementById('step-container');

            let gridHTML = `<div class="grid">`;
            step.options.forEach(opt => {
                gridHTML += `
                    <div class="choice-card" onclick="handleSelect('${step.id}', '${opt.value}', '${opt.label}')">
                        <h3>${opt.label}</h3>
                        <p>${opt.meta}</p>
                    </div>
                `;
            });
            gridHTML += `</div>`;

            root.innerHTML = `
                <div class="step active">
                    <span class="subtitle">${step.subtitle}</span>
                    <h1>${step.title}</h1>
                    <p class="description">${step.desc}</p>
                    ${gridHTML}
                </div>
            `;

            if(step.id === 'final') {
                root.innerHTML += `<div class="loader"></div>`;
                // Data is already in localStorage. Just a fake "sending" delay.
                setTimeout(() => {
                    notify("DATA ENCRYPTED & SAVED", "SYSTEM");
                }, 1500);
            }
        }

        function handleSelect(id, val, label) {
            // Enterprise Data Persistence
            let currentData = JSON.parse(localStorage.getItem('joy_selections') || '{}');
            currentData[id] = label;
            localStorage.setItem('joy_selections', JSON.stringify(currentData));

            notify(`Logged: ${label}`);
            
            currentStep++;
            if (currentStep < config.steps.length) {
                renderStep(currentStep);
            }
        }

        function notify(msg, type = "UPDATE") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = `[${type}] ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.onload = init;
    </script>
</body>
    </html>
