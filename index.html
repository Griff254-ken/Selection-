<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Global Synergy Protocol | Joy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&family=Playfair+Display:ital,wght@0,700;1,400&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #d4af37; /* Architectural Gold */
            --bg-overlay: rgba(10, 15, 25, 0.85);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --transition-speed: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0f19;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- Dynamic Dynamic Background --- */
        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out;
            filter: brightness(0.4) saturate(0.8);
        }

        /* Initial Background: Burj Khalifa */
        .bg-burj { background-image: url('https://images.unsplash.com/photo-1526495124232-a027afbb48b1?auto=format&fit=crop&q=80&w=1920'); }
        /* Alternative: Eiffel Tower */
        .bg-eiffel { background-image: url('https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=1920'); }

        /* --- Main App Shell --- */
        #app-shell {
            width: 90%;
            max-width: 700px;
            background: var(--bg-overlay);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 4rem 3rem;
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            position: relative;
        }

        /* --- Step Transitions --- */
        .step { display: none; animation: fadeIn 0.8s ease forwards; }
        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- UI Components --- */
        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 1rem; color: var(--accent); }
        .subtitle { font-size: 0.75rem; letter-spacing: 5px; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; display: block; }
        
        .choice-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .choice-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            position: relative;
        }

        .choice-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: translateY(-3px);
        }

        .choice-btn span {
            display: block;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* --- Enterprise Toast Logic --- */
        #toast-stack {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 1000;
        }

        .toast {
            background: #fff;
            color: #000;
            padding: 12px 24px;
            margin-bottom: 10px;
            border-left: 5px solid var(--accent);
            font-weight: 700;
            font-size: 0.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease forwards;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .progress-bar {
            position: absolute;
            top: 0; left: 0; height: 3px;
            background: var(--accent);
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

    <div id="bg-container" class="bg-eiffel"></div>
    <div id="toast-stack"></div>

    <main id="app-shell">
        <div class="progress-bar" id="progress"></div>

        <div id="step-content">
            </div>
    </main>

    <script>
        // --- Enterprise Data Structure ---
        const config = {
            steps: [
                {
                    id: 'welcome',
                    subtitle: 'Initialization',
                    title: 'The Elite Selection',
                    description: 'Compare architectural tastes, technical mastery, and linguistic preferences to determine your synergy with the standard.',
                    options: [
                        { label: 'Begin Protocol', value: 'start', type: 'next', bg: 'bg-burj' }
                    ]
                },
                {
                    id: 'architect',
                    subtitle: 'Infrastructure',
                    title: 'Favorite Landmark?',
                    description: 'Choose the silhouette that defines your vision of greatness.',
                    options: [
                        { label: 'Eiffel Tower', value: 'eiffel', meta: 'Paris, France', bg: 'bg-eiffel' },
                        { label: 'Burj Khalifa', value: 'burj', meta: 'Dubai, UAE', bg: 'bg-burj' }
                    ]
                },
                {
                    id: 'engineer',
                    subtitle: 'Authority',
                    title: 'Technical Legend?',
                    description: 'Who represents the pinnacle of digital craftsmanship?',
                    options: [
                        { label: 'Kevin Mitnick', value: 'mitnick', meta: 'The Greatest Hacker' },
                        { label: 'Linus Torvalds', value: 'torvalds', meta: 'The Software Architect' }
                    ]
                },
                {
                    id: 'language',
                    subtitle: 'Communication',
                    title: 'Preferred Dialect?',
                    description: 'Which language are your favorite?',
                    options: [
                        { label: 'French', value: 'french', meta: 'La langue de l\'amour' },
                        { label: 'Chinese', value: 'chinese', meta: 'Mandarin Mastery' },
                        { label: 'Espanyol', value: 'spanish', meta: 'Spanish Elegance' },
                        { label: 'Italian', value: 'italian', meta: 'Lirica Italiana' }
                    ]
                },
                {
                    id: 'final',
                    subtitle: 'Synergy Complete',
                    title: 'Analysis Finished',
                    description: 'Selections logged. The protocol is satisfied. Your preferences align with high-tier excellence.',
                    options: [
                        { label: 'Restart Session', value: 'reset', type: 'reset' }
                    ]
                }
            ]
        };

        let currentStepIndex = 0;
        let selections = {};

        // --- Core Engine ---

        function init() {
            renderStep(0);
            notify("Secure connection established", "SUCCESS");
        }

        function renderStep(index) {
            const step = config.steps[index];
            const container = document.getElementById('step-content');
            
            // Progress Bar
            const progress = ((index + 1) / config.steps.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;

            // Background Transition
            if (step.options[0].bg) {
                updateBackground(step.options[0].bg);
            }

            let optionsHTML = `<div class="choice-list ${step.options.length === 1 ? 'single-choice' : ''}">`;
            step.options.forEach(opt => {
                optionsHTML += `
                    <button class="choice-btn" onclick="handleChoice('${step.id}', '${opt.value}', '${opt.label}', '${opt.bg || ''}')">
                        ${opt.label}
                        ${opt.meta ? `<span>${opt.meta}</span>` : ''}
                    </button>
                `;
            });
            optionsHTML += `</div>`;

            container.innerHTML = `
                <div class="step active">
                    <span class="subtitle">${step.subtitle}</span>
                    <h1>${step.title}</h1>
                    <p>${step.description}</p>
                    ${optionsHTML}
                </div>
            `;
        }

        function handleChoice(stepId, value, label, newBg) {
            if (value === 'reset') {
                location.reload();
                return;
            }

            selections[stepId] = value;
            notify(`Selection Confirmed: ${label}`);
            
            if (newBg) updateBackground(newBg);

            currentStepIndex++;
            if (currentStepIndex < config.steps.length) {
                renderStep(currentStepIndex);
            }
        }

        function updateBackground(bgClass) {
            const bg = document.getElementById('bg-container');
            bg.className = bgClass;
        }

        function notify(msg, prefix = "LOG") {
            const stack = document.getElementById('toast-stack');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = `[${prefix}] ${msg}`;
            stack.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        window.onload = init;
    </script>
</body>
  </html>
